# Default values for kubesandbox-backend.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: jurassicjey/kubesandbox-backend
  pullPolicy: Always
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# ServiceAccount configuration
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

service:
  type: ClusterIP
  port: 8080

# Ingress is disabled in favor of HTTPRoute (Gateway API)
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

# HTTPRoute configuration for Gateway API
httpRoute:
  enabled: true
  annotations: {}
  parentRefs:
    - name: kubesandbox
      namespace: envoy-gateway-system
  hostnames:
    - "kubesandbox.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            add:
              - name: X-Forwarded-Proto
                value: "https"

# Resource configuration
resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Health probes
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

# Autoscaling (disabled by default)
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

volumes: []
volumeMounts: []

nodeSelector: {}
tolerations: []
affinity: {}

# Application configuration
config:
  # Server port
  port: "8080"
  # Namespace where sessions are created
  namespace: "playground"
  # Public origin used to build session URLs ({base}/s/{id})
  publicBaseUrl: "https://kubesandbox.com"
  # Headers for authentication (injected by Envoy Gateway JWT claimToHeaders)
  userEmailHeader: "X-User-Email"
  userNameHeader: "X-User-Name"
  userGroupsHeader: "X-User-Groups"
  # Stable subject id; preferred over email as ownerRef when present
  userIdHeader: "X-User-Id"
  # Maximum concurrent sessions per user
  maxSessionsPerUser: "3"
  # TTL cleanup interval in minutes (reserved for the G3 TTL loop)
  ttlCleanupInterval: "1"

# RBAC configuration
rbac:
  create: true

# NetworkPolicy: restrict who can reach the backend.
# SECURITY (G1 defense-in-depth): the backend trusts X-User-* identity headers,
# so only the Envoy Gateway may reach it — otherwise any pod could spoof identity
# on /api and /authz. Enabled by default; k3s enforces NetworkPolicy natively.
networkPolicy:
  enabled: true
  # Namespace of the Envoy Gateway allowed to reach the backend, selected by the
  # auto-applied kubernetes.io/metadata.name label.
  gatewayNamespace: envoy-gateway-system
  # Optional extra ingress rules (e.g. an in-cluster Prometheus scraper).
  extraIngress: []

# Authentication: JWT SecurityPolicy on the /api route (G1 identity source).
# Disabled by default so installing the chart never breaks an existing route;
# enable once the Authentik backend client / issuer is confirmed.
authentication:
  enabled: false
  jwt:
    providerName: authentik
    # Token issuer (must match the `iss` claim). Example for an Authentik app:
    #   https://auth.jeremymr.dev/application/o/kubesandbox-backend/
    issuer: ""
    # Authentik JWKS endpoint, typically the issuer + "jwks/"
    jwksUri: ""
    # Optional: enforce token audience(s). Empty = do not enforce.
    audiences: []
    # Map validated JWT claims into the X-User-* headers the backend trusts.
    claimToHeaders:
      - claim: sub
        header: X-User-Id
      - claim: email
        header: X-User-Email
      - claim: name
        header: X-User-Name
      - claim: groups
        header: X-User-Groups

# Session ownership enforcement (G2 Option B) — backend-owned session auth.
#
# Design (post-spike 2026-06-27, Options A+B):
#   A. Session HTTPRoutes are in the shared kubesandbox namespace (composition
#      change) so this SecurityPolicy can attach via targetSelectors.
#   B. The backend drives the complete OIDC flow. The SecurityPolicy does
#      ext-authz ONLY: no edge OIDC/JWT. The backend /authz endpoint checks the
#      session cookie and either redirects to Authentik (login) or checks
#      ownership (allow/deny).
#
# Before enabling:
#   1. Ensure the Terraform Workspace (kubesandbox-backend-auth.yaml) has been
#      applied — it registers /oauth2/callback as the redirect URI on the Authentik
#      client AND generates the SESSION_SECRET, writing both to the Secret named in
#      sessionAuth.oidc.clientSecret.name (kubesandbox-backend-client-secret).
#      Keys written: client-id, client-secret, session-secret, issuer-url, jwks-uri.
#   2. Set sessionAuth.oidc.* values (issuer, clientID, redirectURI).
#   3. Set sessionAuth.oidc.clientSecret.name to the Secret name above.
#      Both OIDC_CLIENT_SECRET (key: client-secret) and SESSION_SECRET
#      (key: session-secret) are read from this same Secret.
#   4. Verify on dev: unauthenticated browser → 302 to Authentik → login →
#      cookie set → /s/{id} opens. User B → 403.
sessionAuth:
  enabled: false

  # OIDC configuration for the backend-owned login flow (Option B).
  oidc:
    # Authentik provider issuer URL for the kubesandbox-backend app.
    # e.g. https://auth.jeremymr.dev/application/o/kubesandbox-backend/
    issuer: ""
    # OAuth2 client_id registered in Authentik (e.g. kubesandbox-backend).
    clientID: ""
    # Callback URL registered in Authentik; must match character-for-character.
    # e.g. https://kubesandbox.com/oauth2/callback
    redirectURI: ""
    # Authorization endpoint. Derived from issuer if empty
    # (issuer + "authorize/"). Override if Authentik is behind split-DNS.
    authEndpoint: ""
    # Token endpoint. Derived from issuer if empty (issuer + "token/").
    tokenEndpoint: ""
    # Reference to the Crossplane-managed Secret holding OIDC credentials.
    # Written by kubesandbox-backend-auth.yaml Workspace. Contains:
    #   client-secret  — OIDC client_secret (OIDC_CLIENT_SECRET)
    #   session-secret — HMAC key for cookies + PKCE state (SESSION_SECRET)
    clientSecret:
      name: ""       # e.g. kubesandbox-backend-client-secret
      namespace: ""  # defaults to the chart's release namespace

  # How long the session cookie is valid. Default 8 hours.
  sessionMaxAgeSeconds: 28800

  extAuth:
    # Defaults to this chart's backend Service and service.port.
    backendServiceName: ""
    backendServicePort: ""
    # Namespace of the backend Service. Leave empty if it is in the same
    # namespace as this policy (i.e. the release namespace = kubesandbox).
    backendServiceNamespace: ""
    path: "/authz"

# Backstop sweep CronJob (G3): deletes orphaned session namespaces (managed,
# older than maxAgeHours, with no surviving claim). Safety net for the
# 2026-06-24 post-mortem. Starts in dryRun so the first runs only LOG what they
# would delete — set dryRun: false once you've confirmed the output.
sweep:
  enabled: true
  dryRun: true
  schedule: "*/30 * * * *"
  maxAgeHours: 24
  # Image needs a POSIX shell + kubectl. The sweep script parses timestamps with
  # both GNU and busybox `date`, so coreutils- or busybox-based images both work.
  # (NB: bitnami/kubectl Docker Hub tags were removed in 2025; don't use them.)
  image: "alpine/k8s:1.31.1"
  backoffLimit: 1
  activeDeadlineSeconds: 300
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3