# Default values for kubesandbox-backend.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: jurassicjey/kubesandbox-backend
  pullPolicy: Always
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# ServiceAccount configuration
serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

service:
  type: ClusterIP
  port: 8080

# Ingress is disabled in favor of HTTPRoute (Gateway API)
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

# HTTPRoute configuration for Gateway API
httpRoute:
  enabled: true
  annotations: {}
  parentRefs:
    - name: kubesandbox
      namespace: envoy-gateway-system
  hostnames:
    - "kubesandbox.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            add:
              - name: X-Forwarded-Proto
                value: "https"

# Resource configuration
resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Health probes
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

# Autoscaling (disabled by default)
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

volumes: []
volumeMounts: []

nodeSelector: {}
tolerations: []
affinity: {}

# Application configuration
config:
  # Server port
  port: "8080"
  # Namespace where sessions are created
  namespace: "playground"
  # Public origin used to build session URLs ({base}/s/{id})
  publicBaseUrl: "https://kubesandbox.com"
  # Headers for authentication (injected by Envoy Gateway JWT claimToHeaders)
  userEmailHeader: "X-User-Email"
  userNameHeader: "X-User-Name"
  userGroupsHeader: "X-User-Groups"
  # Stable subject id; preferred over email as ownerRef when present
  userIdHeader: "X-User-Id"
  # Maximum concurrent sessions per user
  maxSessionsPerUser: "3"
  # TTL cleanup interval in minutes (reserved for the G3 TTL loop)
  ttlCleanupInterval: "1"

# RBAC configuration
rbac:
  create: true

# NetworkPolicy: restrict who can reach the backend.
# SECURITY (G1 defense-in-depth): the backend trusts X-User-* identity headers,
# so only the Envoy Gateway may reach it — otherwise any pod could spoof identity
# on /api and /authz. Enabled by default; k3s enforces NetworkPolicy natively.
networkPolicy:
  enabled: true
  # Namespace of the Envoy Gateway allowed to reach the backend, selected by the
  # auto-applied kubernetes.io/metadata.name label.
  gatewayNamespace: envoy-gateway-system
  # Optional extra ingress rules (e.g. an in-cluster Prometheus scraper).
  extraIngress: []

# Authentication: JWT SecurityPolicy on the /api route (G1 identity source).
# Disabled by default so installing the chart never breaks an existing route;
# enable once the Authentik backend client / issuer is confirmed.
authentication:
  enabled: false
  jwt:
    providerName: authentik
    # Token issuer (must match the `iss` claim). Example for an Authentik app:
    #   https://auth.jeremymr.dev/application/o/kubesandbox-backend/
    issuer: ""
    # Authentik JWKS endpoint, typically the issuer + "jwks/"
    jwksUri: ""
    # Optional: enforce token audience(s). Empty = do not enforce.
    audiences: []
    # Map validated JWT claims into the X-User-* headers the backend trusts.
    claimToHeaders:
      - claim: sub
        header: X-User-Id
      - claim: email
        header: X-User-Email
      - claim: name
        header: X-User-Name
      - claim: groups
        header: X-User-Groups

# Session ownership enforcement (G2) — the shared SecurityPolicy on all /s/{id}
# routes: OIDC (cookie) -> JWT (claimToHeaders) -> ext-authz to backend /authz.
# DEFAULT-OFF and UNVERIFIED against a live gateway: see the VERIFICATION REQUIRED
# block in templates/securitypolicy-session.yaml before enabling in prod.
sessionAuth:
  enabled: false
  oidc:
    # Authentik issuer for the session (browser) login flow.
    issuer: ""
    clientID: ""
    clientSecret:
      # Crossplane-written client secret (e.g. kubesandbox-frontend-client-secret).
      name: ""
      namespace: ""
    # Must match the Authentik redirect URI character-for-character.
    redirectURL: ""
    logoutPath: "/logout"
    # Forward the token upstream so the jwt provider can validate it.
    forwardAccessToken: true
  jwt:
    providerName: authentik
    issuer: ""
    jwksUri: ""
    # Defaults to the standard sub/email/name/groups mapping if omitted.
    claimToHeaders: []
  extAuth:
    # Defaults to this chart's backend Service and service.port.
    backendServiceName: ""
    backendServicePort: ""
    path: "/authz"

# Backstop sweep CronJob (G3): deletes orphaned session namespaces (managed,
# older than maxAgeHours, with no surviving claim). Safety net for the
# 2026-06-24 post-mortem. Starts in dryRun so the first runs only LOG what they
# would delete — set dryRun: false once you've confirmed the output.
sweep:
  enabled: true
  dryRun: true
  schedule: "*/30 * * * *"
  maxAgeHours: 24
  # Debian-based image with kubectl + GNU date (date -d). Pin to your cluster's
  # minor version where practical.
  image: "bitnami/kubectl:1.31"
  backoffLimit: 1
  activeDeadlineSeconds: 300
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3