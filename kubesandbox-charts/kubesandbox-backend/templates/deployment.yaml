apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubesandbox-backend.fullname" . }}
  labels:
    {{- include "kubesandbox-backend.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "kubesandbox-backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "kubesandbox-backend.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "kubesandbox-backend.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.config.port | quote }}
            - name: NAMESPACE
              value: {{ .Values.config.namespace | quote }}
            - name: PUBLIC_BASE_URL
              value: {{ .Values.config.publicBaseUrl | quote }}
            - name: USER_EMAIL_HEADER
              value: {{ .Values.config.userEmailHeader | quote }}
            - name: USER_NAME_HEADER
              value: {{ .Values.config.userNameHeader | quote }}
            - name: USER_GROUPS_HEADER
              value: {{ .Values.config.userGroupsHeader | quote }}
            - name: USER_ID_HEADER
              value: {{ .Values.config.userIdHeader | quote }}
            - name: MAX_SESSIONS_PER_USER
              value: {{ .Values.config.maxSessionsPerUser | quote }}
            - name: TTL_CLEANUP_INTERVAL
              value: {{ .Values.config.ttlCleanupInterval | quote }}
            {{- if .Values.sessionAuth.enabled }}
            # --- G2 Option B: backend-owned session auth ---
            - name: OIDC_ISSUER
              value: {{ .Values.sessionAuth.oidc.issuer | quote }}
            - name: OIDC_CLIENT_ID
              value: {{ .Values.sessionAuth.oidc.clientID | quote }}
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ required "sessionAuth.oidc.clientSecret.name is required when sessionAuth.enabled" .Values.sessionAuth.oidc.clientSecret.name }}
                  key: client-secret
            - name: OIDC_REDIRECT_URI
              value: {{ .Values.sessionAuth.oidc.redirectURI | quote }}
            {{- if .Values.sessionAuth.oidc.authEndpoint }}
            - name: OIDC_AUTH_ENDPOINT
              value: {{ .Values.sessionAuth.oidc.authEndpoint | quote }}
            {{- end }}
            {{- if .Values.sessionAuth.oidc.tokenEndpoint }}
            - name: OIDC_TOKEN_ENDPOINT
              value: {{ .Values.sessionAuth.oidc.tokenEndpoint | quote }}
            {{- end }}
            # SESSION_SECRET is output by the same Terraform Workspace that
            # provisions the OIDC client (kubesandbox-backend-auth.yaml) and
            # written to the same Secret under key "session-secret".
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ required "sessionAuth.oidc.clientSecret.name is required when sessionAuth.enabled" .Values.sessionAuth.oidc.clientSecret.name }}
                  key: session-secret
            - name: SESSION_MAX_AGE_SECONDS
              value: {{ .Values.sessionAuth.sessionMaxAgeSeconds | default 28800 | quote }}
            {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}