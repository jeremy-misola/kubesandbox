{{- if .Values.sessionAuth.enabled -}}
{{- $fullName := include "kubesandbox-backend.fullname" . -}}
{{- $sa := .Values.sessionAuth -}}
# Shared per-session SecurityPolicy (G2 Option B) — ext-authz ownership enforcement.
#
# Design (post-spike, 2026-06-27): The original G2 design (OIDC → JWT →
# ext-authz in one policy) does not work on EG v1.7.1: SecurityPolicy attaches
# same-namespace only (sessions were per-namespace), and ext-authz fires before
# OIDC can log the user in. The redesign (Options A + B):
#
#   Option A: session HTTPRoutes moved to the shared "kubesandbox" namespace
#             (composition change) so this policy can attach to them via
#             targetSelectors. A ReferenceGrant in each session namespace permits
#             the cross-namespace backendRef to the per-session shell Service.
#
#   Option B: the backend owns the full auth flow. This policy does ext-authz
#             ONLY — no edge OIDC, no JWT. The backend /authz endpoint:
#               • no valid session cookie → returns 302 to Authentik (Envoy
#                 forwards the redirect to the browser; user logs in; Authentik
#                 redirects to /oauth2/callback; backend exchanges code, sets
#                 cookie, redirects back to /s/{id}/...).
#               • valid cookie, caller owns session → 200 (allow).
#               • valid cookie, not owner / unknown id → 403 (deny).
#             All auth logic lives in one place; no ext-authz-before-OIDC race.
#
# The policy lives in the kubesandbox namespace (same namespace as the session
# HTTPRoutes after Option A) so targetSelectors can attach to them.
#
# Pre-flight before enabling:
#   1. sessionAuth.extAuth.* values point to the backend Service + /authz path.
#   2. SESSION_SECRET, OIDC_CLIENT_ID, OIDC_CLIENT_SECRET, OIDC_ISSUER,
#      OIDC_REDIRECT_URI are all set in the deployment (chart values).
#   3. https://kubesandbox.com/oauth2/callback is registered as a redirect URI
#      on the kubesandbox-backend Authentik client.
#   4. Verify on dev: unauthenticated browser → 302 to Authentik → login →
#      cookie set → /s/{id} opens. User B → 403.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: {{ $fullName }}-session
  labels:
    {{- include "kubesandbox-backend.labels" . | nindent 4 }}
spec:
  # One policy for all session routes (now all in the kubesandbox namespace).
  # The composition stamps kubesandbox.com/session-route: "true" on every shell
  # HTTPRoute, and targetSelectors matches them without a per-session policy.
  targetSelectors:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      matchLabels:
        kubesandbox.com/session-route: "true"

  # ext-authz only — the backend drives the complete OIDC flow (Option B).
  # No edge OIDC or JWT here: the /authz handler reads the session cookie,
  # redirects to Authentik if missing/invalid, and checks ownership if present.
  extAuth:
    # Forward the Cookie header (session cookie) and the original request path
    # to the auth backend. All other standard headers are forwarded by default.
    headersToExtAuth:
      - cookie
      - x-forwarded-uri
      - x-original-uri
      - x-envoy-original-path
    http:
      backendRefs:
        - name: {{ $sa.extAuth.backendServiceName | default $fullName }}
          port: {{ $sa.extAuth.backendServicePort | default .Values.service.port }}
          {{- if $sa.extAuth.backendServiceNamespace }}
          namespace: {{ $sa.extAuth.backendServiceNamespace }}
          {{- end }}
      path: {{ $sa.extAuth.path | default "/authz" | quote }}
{{- end }}
