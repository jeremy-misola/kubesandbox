apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: kubesandbox-session
  annotations:
    argocd.argoproj.io/sync-wave: "18"
spec:
  compositeTypeRef:
    apiVersion: platform.kubesandbox.com/v1alpha1
    kind: XKubeSandboxSession
  mode: Pipeline
  pipeline:
    - step: patch-and-transform
      functionRef:
        name: function-patch-and-transform
      input:
        apiVersion: pt.fn.crossplane.io/v1beta1
        kind: Resources
        resources:
          - name: session-namespace
            base:
              apiVersion: kubernetes.crossplane.io/v1alpha2
              kind: Object
              metadata:
                name: placeholder
                annotations:
                  argocd.argoproj.io/sync-wave: "18"
              spec:
                providerConfigRef:
                  name: kubernetes-incluster
                forProvider:
                  manifest:
                    apiVersion: v1
                    kind: Namespace
                    metadata:
                      name: placeholder
                      labels:
                        kubesandbox.com/managed: "true"
                        kubesandbox.com/tenant: placeholder
                        kubesandbox.com/owner: placeholder
                        kubesandbox.com/profile: placeholder
            patches:
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: metadata.labels[crossplane.io/claim-namespace]
                    - fromFieldPath: metadata.labels[crossplane.io/claim-name]
                  strategy: string
                  string:
                    fmt: "%s-%s-namespace"
                toFieldPath: metadata.name
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: metadata.labels[crossplane.io/claim-namespace]
                    - fromFieldPath: metadata.labels[crossplane.io/claim-name]
                  strategy: string
                  string:
                    fmt: "%s-%s"
                toFieldPath: spec.forProvider.manifest.metadata.name
              - type: FromCompositeFieldPath
                fromFieldPath: spec.tenantRef
                toFieldPath: spec.forProvider.manifest.metadata.labels[kubesandbox.com/tenant]
              - type: FromCompositeFieldPath
                fromFieldPath: spec.ownerRef
                toFieldPath: spec.forProvider.manifest.metadata.labels[kubesandbox.com/owner]
              - type: FromCompositeFieldPath
                fromFieldPath: spec.profile
                toFieldPath: spec.forProvider.manifest.metadata.labels[kubesandbox.com/profile]
              - type: ToCompositeFieldPath
                fromFieldPath: metadata.name
                toFieldPath: status.sessionNamespace

          - name: session-resourcequota
            base:
              apiVersion: kubernetes.crossplane.io/v1alpha2
              kind: Object
              metadata:
                name: placeholder
                annotations:
                  argocd.argoproj.io/sync-wave: "18"
              spec:
                providerConfigRef:
                  name: kubernetes-incluster
                forProvider:
                  manifest:
                    apiVersion: v1
                    kind: ResourceQuota
                    metadata:
                      name: session-quota
                      namespace: placeholder
                    spec:
                      hard:
                        pods: "10"
                        services: "20"
                        configmaps: "20"
                        secrets: "20"
                        requests.cpu: "4"
                        requests.memory: 8Gi
                        limits.cpu: "4"
                        limits.memory: 8Gi
            patches:
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: metadata.labels[crossplane.io/claim-namespace]
                    - fromFieldPath: metadata.labels[crossplane.io/claim-name]
                  strategy: string
                  string:
                    fmt: "%s-%s-resourcequota"
                toFieldPath: metadata.name
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: metadata.labels[crossplane.io/claim-namespace]
                    - fromFieldPath: metadata.labels[crossplane.io/claim-name]
                  strategy: string
                  string:
                    fmt: "%s-%s"
                toFieldPath: spec.forProvider.manifest.metadata.namespace

          - name: vcluster-release
            base:
              apiVersion: helm.crossplane.io/v1beta1
              kind: Release
              metadata:
                name: placeholder
                annotations:
                  argocd.argoproj.io/sync-wave: "18"
              spec:
                providerConfigRef:
                  name: helm-incluster
                forProvider:
                  chart:
                    name: vcluster
                    repository: https://charts.loft.sh
                  namespace: placeholder
                  skipCreateNamespace: true
                  values:
                    controlPlane:
                      statefulSet:
                        resources:
                          limits:
                            cpu: 200m
                        persistence:
                          volumeClaim:
                            enabled: false
            patches:
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: metadata.labels[crossplane.io/claim-namespace]
                    - fromFieldPath: metadata.labels[crossplane.io/claim-name]
                  strategy: string
                  string:
                    fmt: "%s-%s-vcluster"
                toFieldPath: metadata.name
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: metadata.labels[crossplane.io/claim-namespace]
                    - fromFieldPath: metadata.labels[crossplane.io/claim-name]
                  strategy: string
                  string:
                    fmt: "%s-%s"
                toFieldPath: spec.forProvider.namespace
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: metadata.labels[crossplane.io/claim-namespace]
                    - fromFieldPath: metadata.labels[crossplane.io/claim-name]
                    - fromFieldPath: metadata.labels[crossplane.io/claim-namespace]
                    - fromFieldPath: metadata.labels[crossplane.io/claim-name]
                  strategy: string
                  string:
                    fmt: "https://%s-%s-vcluster.%s-%s:443"
                toFieldPath: spec.forProvider.values.exportKubeConfig.server
              - type: ToCompositeFieldPath
                fromFieldPath: metadata.name
                toFieldPath: status.vclusterRelease

          - name: shell-networkpolicy
            base:
              apiVersion: kubernetes.crossplane.io/v1alpha2
              kind: Object
              metadata:
                name: placeholder
                annotations:
                  argocd.argoproj.io/sync-wave: "18"
              spec:
                providerConfigRef:
                  name: kubernetes-incluster
                forProvider:
                  manifest:
                    apiVersion: networking.k8s.io/v1
                    kind: NetworkPolicy
                    metadata:
                      name: shell-networkpolicy
                      namespace: placeholder
                    spec:
                      podSelector:
                        matchLabels:
                          app: shell
                      policyTypes:
                        - Ingress
                        - Egress
                      ingress:
                        - from:
                            - namespaceSelector:
                                matchLabels:
                                  kubernetes.io/metadata.name: envoy-gateway-system
                          ports:
                            - protocol: TCP
                              port: 8080
                      egress:
                        - to:
                            - namespaceSelector:
                                matchLabels:
                                  kubernetes.io/metadata.name: placeholder
                          ports:
                            - protocol: TCP
                              port: 443
                            - protocol: TCP
                              port: 8443
                        - to:
                            - namespaceSelector:
                                matchLabels:
                                  kubernetes.io/metadata.name: kube-system
                              podSelector:
                                matchLabels:
                                  k8s-app: kube-dns
                          ports:
                            - protocol: TCP
                              port: 53
                            - protocol: UDP
                              port: 53
                        - to:
                            - namespaceSelector:
                                matchLabels:
                                  kubernetes.io/metadata.name: kube-system
                              podSelector:
                                matchLabels:
                                  k8s-app: coredns
                          ports:
                            - protocol: TCP
                              port: 53
                            - protocol: UDP
                              port: 53
            patches:
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: metadata.labels[crossplane.io/claim-namespace]
                    - fromFieldPath: metadata.labels[crossplane.io/claim-name]
                  strategy: string
                  string:
                    fmt: "%s-%s-networkpolicy"
                toFieldPath: metadata.name
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: metadata.labels[crossplane.io/claim-namespace]
                    - fromFieldPath: metadata.labels[crossplane.io/claim-name]
                  strategy: string
                  string:
                    fmt: "%s-%s"
                toFieldPath: spec.forProvider.manifest.metadata.namespace
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: metadata.labels[crossplane.io/claim-namespace]
                    - fromFieldPath: metadata.labels[crossplane.io/claim-name]
                  strategy: string
                  string:
                    fmt: "%s-%s"
                toFieldPath: spec.forProvider.manifest.spec.egress[0].to[0].namespaceSelector.matchLabels[kubernetes.io/metadata.name]

          - name: shell-pod
            base:
              apiVersion: kubernetes.crossplane.io/v1alpha2
              kind: Object
              metadata:
                name: placeholder
                annotations:
                  argocd.argoproj.io/sync-wave: "18"
              spec:
                providerConfigRef:
                  name: kubernetes-incluster
                forProvider:
                  manifest:
                    apiVersion: v1
                    kind: Pod
                    metadata:
                      name: shell
                      namespace: placeholder
                      labels:
                        app: shell
                    spec:
                      automountServiceAccountToken: false
                      enableServiceLinks: false
                      restartPolicy: Never
                      securityContext:
                        fsGroup: 1000
                        runAsNonRoot: true
                        seccompProfile:
                          type: RuntimeDefault
                      containers:
                        - name: shell
                          image: jurassicjey/ttyd-k8s:ttyd
                          imagePullPolicy: IfNotPresent
                          securityContext:
                            allowPrivilegeEscalation: false
                            capabilities:
                              drop:
                                - ALL
                            readOnlyRootFilesystem: true
                            runAsGroup: 1000
                            runAsNonRoot: true
                            runAsUser: 1000
                          resources: {}
                          command:
                            - sh
                            - -lc
                            - cp /kubeconfig/config /tmp/kubeconfig && export KUBECONFIG=/tmp/kubeconfig && (kubectl config set-context --current --namespace=default >/dev/null 2>&1 || true) && cd /tmp && exec ttyd -W -p 8080 sh
                          env:
                            - name: HOME
                              value: /tmp
                            - name: KUBECONFIG
                              value: /tmp/kubeconfig
                          volumeMounts:
                            - name: vcluster-kubeconfig
                              mountPath: /kubeconfig
                              readOnly: true
                            - name: tmp
                              mountPath: /tmp
                          ports:
                            - containerPort: 8080
                          stdin: true
                          tty: true
                      volumes:
                        - name: vcluster-kubeconfig
                          secret:
                            secretName: placeholder
                        - name: tmp
                          emptyDir: {}
            patches:
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: metadata.labels[crossplane.io/claim-namespace]
                    - fromFieldPath: metadata.labels[crossplane.io/claim-name]
                  strategy: string
                  string:
                    fmt: "%s-%s-shell-pod"
                toFieldPath: metadata.name
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: metadata.labels[crossplane.io/claim-namespace]
                    - fromFieldPath: metadata.labels[crossplane.io/claim-name]
                  strategy: string
                  string:
                    fmt: "%s-%s"
                toFieldPath: spec.forProvider.manifest.metadata.namespace
              - type: FromCompositeFieldPath
                fromFieldPath: spec.workspaceImage
                toFieldPath: spec.forProvider.manifest.spec.containers[0].image
                policy:
                  fromFieldPath: Optional
              - type: FromCompositeFieldPath
                fromFieldPath: spec.resources.cpu
                toFieldPath: spec.forProvider.manifest.spec.containers[0].resources.requests.cpu
                policy:
                  fromFieldPath: Optional
              - type: FromCompositeFieldPath
                fromFieldPath: spec.resources.cpu
                toFieldPath: spec.forProvider.manifest.spec.containers[0].resources.limits.cpu
                policy:
                  fromFieldPath: Optional
              - type: FromCompositeFieldPath
                fromFieldPath: spec.resources.memory
                toFieldPath: spec.forProvider.manifest.spec.containers[0].resources.requests.memory
                policy:
                  fromFieldPath: Optional
              - type: FromCompositeFieldPath
                fromFieldPath: spec.resources.memory
                toFieldPath: spec.forProvider.manifest.spec.containers[0].resources.limits.memory
                policy:
                  fromFieldPath: Optional
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: metadata.labels[crossplane.io/claim-namespace]
                    - fromFieldPath: metadata.labels[crossplane.io/claim-name]
                  strategy: string
                  string:
                    fmt: "vc-%s-%s-vcluster"
                toFieldPath: spec.forProvider.manifest.spec.volumes[0].secret.secretName
              - type: ToCompositeFieldPath
                fromFieldPath: metadata.name
                toFieldPath: status.workspacePod
              - type: ToCompositeFieldPath
                fromFieldPath: status.atProvider.manifest.status.phase
                toFieldPath: status.phase
                transforms:
                  - type: map
                    map:
                      Pending: Provisioning
                      Running: Ready
                      Succeeded: Ready
                      Failed: Error
                      Unknown: Unknown
                policy:
                  fromFieldPath: Optional
              - type: ToCompositeFieldPath
                fromFieldPath: status.atProvider.manifest.status.phase
                toFieldPath: status.message
                transforms:
                  - type: string
                    string:
                      type: Format
                      fmt: "shell pod phase: %s"
                policy:
                  fromFieldPath: Optional
              - type: ToCompositeFieldPath
                fromFieldPath: status.atProvider.manifest.status.phase
                toFieldPath: status.workspaceReady
                transforms:
                  - type: map
                    map:
                      Running: true
                      Succeeded: true
                      Pending: false
                      Failed: false
                      Unknown: false
                policy:
                  fromFieldPath: Optional
            readinessChecks:
              - type: MatchString
                fieldPath: status.atProvider.manifest.status.phase
                matchString: Running

          - name: shell-service
            base:
              apiVersion: kubernetes.crossplane.io/v1alpha2
              kind: Object
              metadata:
                name: placeholder
                annotations:
                  argocd.argoproj.io/sync-wave: "18"
              spec:
                providerConfigRef:
                  name: kubernetes-incluster
                forProvider:
                  manifest:
                    apiVersion: v1
                    kind: Service
                    metadata:
                      name: shell
                      namespace: placeholder
                    spec:
                      type: ClusterIP
                      selector:
                        app: shell
                      ports:
                        - name: http
                          port: 80
                          targetPort: 8080
            patches:
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: metadata.labels[crossplane.io/claim-namespace]
                    - fromFieldPath: metadata.labels[crossplane.io/claim-name]
                  strategy: string
                  string:
                    fmt: "%s-%s-shell-service"
                toFieldPath: metadata.name
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: metadata.labels[crossplane.io/claim-namespace]
                    - fromFieldPath: metadata.labels[crossplane.io/claim-name]
                  strategy: string
                  string:
                    fmt: "%s-%s"
                toFieldPath: spec.forProvider.manifest.metadata.namespace

          - name: shell-httproute
            base:
              apiVersion: kubernetes.crossplane.io/v1alpha2
              kind: Object
              metadata:
                name: placeholder
                annotations:
                  argocd.argoproj.io/sync-wave: "18"
              spec:
                providerConfigRef:
                  name: kubernetes-incluster
                forProvider:
                  manifest:
                    apiVersion: gateway.networking.k8s.io/v1
                    kind: HTTPRoute
                    metadata:
                      name: shell
                      namespace: placeholder
                    spec:
                      parentRefs:
                        - name: kubesandbox
                          namespace: envoy-gateway-system
                      hostnames:
                        - placeholder
                      rules:
                        - backendRefs:
                            - name: shell
                              port: 80
            patches:
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: metadata.labels[crossplane.io/claim-namespace]
                    - fromFieldPath: metadata.labels[crossplane.io/claim-name]
                  strategy: string
                  string:
                    fmt: "%s-%s-httproute"
                toFieldPath: metadata.name
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: metadata.labels[crossplane.io/claim-namespace]
                    - fromFieldPath: metadata.labels[crossplane.io/claim-name]
                  strategy: string
                  string:
                    fmt: "%s-%s"
                toFieldPath: spec.forProvider.manifest.metadata.namespace
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: metadata.labels[crossplane.io/claim-namespace]
                    - fromFieldPath: metadata.labels[crossplane.io/claim-name]
                  strategy: string
                  string:
                    fmt: "%s-%s.kubesandbox.com"
                toFieldPath: spec.forProvider.manifest.spec.hostnames[0]
    - step: automatically-detect-ready-composed-resources
      functionRef:
        name: function-auto-ready
