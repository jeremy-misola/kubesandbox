{{- if .Values.httpRoute.enabled -}}
{{- $fullName := include "helm.fullname" . -}}
{{- $svcPort := .Values.service.port -}}
{{- $annotations := .Values.httpRoute.annotations -}}
{{- $parentRefs := .Values.httpRoute.parentRefs -}}
{{- $hostnames := .Values.httpRoute.hostnames -}}

# Public HTTPRoute - No authentication required
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fullName }}-public
  labels:
    {{- include "helm.labels" . | nindent 4 }}
    app.kubernetes.io/component: public
  {{- with $annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- with $parentRefs }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with $hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.httpRoute.publicPaths }}
    - matches:
      - path:
          type: {{ .type }}
          value: {{ .path }}
      backendRefs:
        - name: {{ $fullName }}
          port: {{ $svcPort }}
          weight: 1
    {{- end }}
---
# Protected HTTPRoute - OIDC authentication required (SecurityPolicy targets this route)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fullName }}-protected
  labels:
    {{- include "helm.labels" . | nindent 4 }}
    app.kubernetes.io/component: protected
  {{- with $annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- with $parentRefs }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with $hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.httpRoute.protectedPaths }}
    - matches:
      - path:
          type: {{ .type }}
          value: {{ .path }}
      backendRefs:
        - name: {{ $fullName }}
          port: {{ $svcPort }}
          weight: 1
    {{- end }}
{{- end }}